# .github/workflows/ci-cd.yml
#
# ShipForge CI/CD Pipeline
# ─────────────────────────
# Triggers:
#   • Every push to main  → full pipeline (lint → build → push → health check)
#   • Every pull request  → lint + build only (no push, no deploy)
#
# Required GitHub secrets:
#   DOCKER_USERNAME   — your Docker Hub username  (garvg4278)
#   DOCKER_PASSWORD   — Docker Hub access token (NOT your login password)
#                       Create one at: hub.docker.com → Account Settings → Security
#
# Optional GitHub secrets for production deployment:
#   DEPLOY_HOST       — SSH hostname / IP of your server
#   DEPLOY_USER       — SSH username
#   DEPLOY_KEY        — SSH private key (contents of ~/.ssh/id_rsa)

name: CI/CD Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents resource waste on rapid successive commits.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BACKEND_IMAGE: garvg4278/shipforge-backend
    FRONTEND_IMAGE: garvg4278/shipforge-frontend
    NODE_VERSION: "20"
    PYTHON_VERSION: "3.11"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Lint & type-check the backend
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
    lint-backend:
        name: Lint · Backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            # Syntax-check every JS file without needing a DB or running the server.
            # Mirrors the same check run during development.
            - name: Syntax check all JS files
              run: |
                  echo "Checking syntax on all backend JS files..."
                  find . -name "*.js" \
                    ! -path "./node_modules/*" \
                    ! -path "./prisma/migrations/*" \
                    -print0 | xargs -0 node --check
                  echo "All files passed syntax check."

            # Validate Prisma schema is parseable
            - name: Validate Prisma schema
              run: npx prisma validate

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 2 — Type-check the frontend
    # ═══════════════════════════════════════════════════════════════════════════════
    lint-frontend:
        name: Lint · Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            # Run the Next.js TypeScript compiler without emitting output files.
            # Catches type errors across all .tsx/.ts files exactly as tsc would.
            - name: TypeScript type-check
              run: npx tsc --noEmit

            - name: Next.js lint
              run: npm run lint --if-present

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 3 — Build Docker images
    # Depends on both lint jobs passing so broken code never gets an image.
    # ═══════════════════════════════════════════════════════════════════════════════
    build:
        name: Build · Docker Images
        runs-on: ubuntu-latest
        needs: [ lint-backend, lint-frontend ]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # Set up Docker Buildx for multi-platform builds and layer caching.
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Login is required even on PRs if you want to pull cached layers from
            # Docker Hub. On PRs from forks this step is skipped (secrets unavailable).
            - name: Login to Docker Hub
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # ── Backend image ───────────────────────────────────────────────────────
            # cache-from / cache-to: reuse unchanged layers across runs.
            # On PRs: build only (push: false). On main: build + push.
            - name: Build backend image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: |
                      ${{ env.BACKEND_IMAGE }}:latest
                      ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
                  cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
                  cache-to: ${{ github.event_name != 'pull_request' &&
                      format('type=registry,ref={0}:buildcache,mode=max',
                      env.BACKEND_IMAGE) || '' }}

            # ── Frontend image ──────────────────────────────────────────────────────
            # NEXT_PUBLIC_API_URL is baked into the Next.js build at image creation.
            # It points to the backend container name as used in docker-compose.yml.
            - name: Build frontend image
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: |
                      ${{ env.FRONTEND_IMAGE }}:latest
                      ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
                  build-args: |
                      NEXT_PUBLIC_API_URL=http://backend:5000/api
                  cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
                  cache-to: ${{ github.event_name != 'pull_request' &&
                      format('type=registry,ref={0}:buildcache,mode=max',
                      env.FRONTEND_IMAGE) || '' }}

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 4 — Integration health check
    # Spins up the full stack with docker compose and runs the Python health check
    # script against it. Proves images actually boot and the API responds correctly.
    # Only runs on pushes to main (not PRs) since it needs the freshly pushed images.
    # ═══════════════════════════════════════════════════════════════════════════════
    health-check:
        name: Integration · Health Check
        runs-on: ubuntu-latest
        needs: [ build ]
        if: github.event_name != 'pull_request'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            # Write a minimal .env for the docker compose run.
            # JWT_SECRET uses a random 64-byte hex string generated fresh each run.
            - name: Write CI environment file
              run: |
                  JWT=$(python3 -c "import secrets; print(secrets.token_hex(64))")
                  cat > .env <<EOF
                  DATABASE_URL=postgresql://shipforge:shipforge_ci@db:5432/shipforge
                  JWT_SECRET=${JWT}
                  NODE_ENV=production
                  PORT=5000
                  CORS_ORIGIN=http://localhost:3000
                  EOF

            # Pull the images that were just pushed in the build job
            - name: Pull latest images
              run: docker compose pull

            - name: Start full stack
              run: docker compose up -d

            # Wait for the backend to become healthy before running checks.
            # Polls /api/health every 3 seconds for up to 90 seconds.
            - name: Wait for backend to be healthy
              run: |
                  echo "Waiting for backend to become healthy..."
                  for i in $(seq 1 30); do
                    if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                      echo "Backend is healthy after $((i * 3))s"
                      exit 0
                    fi
                    echo "  attempt $i/30 — retrying in 3s"
                    sleep 3
                  done
                  echo "Backend did not become healthy in 90s"
                  docker compose logs backend
                  exit 1

            # Run the Python health check script. Uses --skip-env because env vars
            # are already injected by the CI step above, not read from a local file.
            - name: Run health check script
              run: |
                  python3 backend/scripts/health_check.py \
                    --host localhost \
                    --port 5000 \
                    --skip-env \
                    --timeout 15 \
                    --warn-ms 500

            - name: Show container logs on failure
              if: failure()
              run: |
                  echo "=== backend logs ==="
                  docker compose logs backend --tail 60
                  echo "=== db logs ==="
                  docker compose logs db --tail 30

            - name: Tear down stack
              if: always()
              run: docker compose down -v
    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 5 — Deploy to production (optional — uncomment when you have a server)
    # Connects via SSH and does a docker compose pull + up on the remote host.
    # Only runs after a successful health check on the main branch.

# .github/workflows/ci-cd.yml
#
# ShipForge CI/CD Pipeline
# ─────────────────────────
# Triggers:
#   • Push to main        → full pipeline: lint → build → push → health check
#   • Pull request        → lint + build only (no push, no integration test)
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   DOCKER_USERNAME   — Docker Hub username          (garvg4278)
#   DOCKER_PASSWORD   — Docker Hub access token      (NOT your login password)
#                       Create at: hub.docker.com → Account Settings → Security → New Token

name: CI/CD Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BACKEND_IMAGE: garvg4278/shipforge-backend
    FRONTEND_IMAGE: garvg4278/shipforge-frontend
    NODE_VERSION: "20"
    PYTHON_VERSION: "3.11"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Backend lint
# Runs fast JS syntax check + Prisma schema validation. No database needed.
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
    lint-backend:
        name: Lint · Backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Syntax-check all JS files
              run: |
                  echo "Running node --check on all backend source files..."
                  find . \
                    -name "*.js" \
                    ! -path "./node_modules/*" \
                    ! -path "./prisma/migrations/*" \
                    -print0 | xargs -0 node --check
                  echo "✓ All files passed syntax check."

            # prisma validate only checks the schema file — no live DB connection needed.
            # Provide a dummy URL so the schema parser is satisfied.
            - name: Validate Prisma schema
              run: npx prisma validate
              env:
                  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 2 — Frontend type-check
    #
    # FIX 1: `npx tsc --noEmit` was failing because next-env.d.ts contained
    #   import "./.next/dev/types/routes.d.ts"
    #   That file only exists after `next dev` runs — it doesn't exist in a
    #   fresh CI checkout. Fixed by cleaning next-env.d.ts and removing
    #   .next/dev/types from tsconfig.json include array.
    #
    # FIX 2: `npx next lint .` is invalid — next lint doesn't accept a path arg
    #   and throws "No ESLint configuration found" when given one.
    #   Replaced with `npm run lint` which calls `next lint` correctly.
    #   Added --if-present so the step is silently skipped if no lint script exists.
    # ═══════════════════════════════════════════════════════════════════════════════
    lint-frontend:
        name: Lint · Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            # tsc --noEmit type-checks all .ts/.tsx files without emitting JS.
            # Requires tsconfig.json to NOT include .next/dev/types/** (fixed).
            - name: TypeScript type-check
              run: npx tsc --noEmit

            # `npm run lint` calls `next lint` which reads the project eslint config.
            # --if-present means this step is silently skipped if no lint script exists
            # in package.json (prevents failure on projects without ESLint configured).
            - name: ESLint
              run: npm run lint --if-present

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 3 — Build Docker images
    # Only runs after both lint jobs pass. Images are tagged with both :latest
    # and :<git-sha> for pinned rollbacks.
    #
    # FIX: cache-to used an inline JS ternary across YAML lines — invalid YAML.
    #      Replaced with separate steps for push vs PR runs using `if:` conditions.
    # ═══════════════════════════════════════════════════════════════════════════════
    build:
        name: Build · Docker Images
        runs-on: ubuntu-latest
        needs: [ lint-backend, lint-frontend ]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # ── Backend image ───────────────────────────────────────────────────────
            # On push to main: build, push, and write to the cache registry tag.
            - name: Build and push backend image (main)
              if: github.event_name != 'pull_request'
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: true
                  tags: |
                      ${{ env.BACKEND_IMAGE }}:latest
                      ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
                  cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
                  cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

            # On pull requests: build only (no push, no cache write — secrets unavailable).
            - name: Build backend image (pull request)
              if: github.event_name == 'pull_request'
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: false
                  tags: ${{ env.BACKEND_IMAGE }}:pr-${{ github.sha }}

            # ── Frontend image ──────────────────────────────────────────────────────
            # NEXT_PUBLIC_API_URL is baked into the JS bundle at build time.
            # http://localhost:5000/api works for the health-check job below (loopback).
            # For a real production deploy, override this build-arg with your public domain.
            - name: Build and push frontend image (main)
              if: github.event_name != 'pull_request'
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: true
                  tags: |
                      ${{ env.FRONTEND_IMAGE }}:latest
                      ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
                  build-args: |
                      NEXT_PUBLIC_API_URL=http://localhost:5000/api
                  cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
                  cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

            - name: Build frontend image (pull request)
              if: github.event_name == 'pull_request'
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: false
                  tags: ${{ env.FRONTEND_IMAGE }}:pr-${{ github.sha }}
                  build-args: |
                      NEXT_PUBLIC_API_URL=http://localhost:5000/api

    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 4 — Integration health check
    # Pulls the freshly-pushed images, starts the full stack with docker compose,
    # waits for the backend healthcheck to pass, then runs the Python health check
    # script which validates all endpoints.
    #
    # FIX: heredoc in the .env step had leading spaces that were being included in
    #      the env var values (e.g. DATABASE_URL=" postgresql://..."). Fixed with
    #      no-indent heredoc.
    #
    # FIX: frontend depends_on backend with service_started — changed to
    #      service_healthy in docker-compose.yml so the health-check job benefits
    #      from the backend's HEALTHCHECK instruction.
    # ═══════════════════════════════════════════════════════════════════════════════
    health-check:
        name: Integration · Health Check
        runs-on: ubuntu-latest
        needs: [ build ]
        if: github.event_name != 'pull_request'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            # Write a clean .env with no leading whitespace.
            # JWT_SECRET is randomly generated fresh for each CI run.
            - name: Write CI environment file
              run: |
                  JWT=$(python3 -c "import secrets; print(secrets.token_hex(64))")
                  cat > .env << EOF
                  POSTGRES_USER=shipforge
                  POSTGRES_PASSWORD=shipforge_ci
                  POSTGRES_DB=shipforge
                  DATABASE_URL=postgresql://shipforge:shipforge_ci@db:5432/shipforge
                  JWT_SECRET=${JWT}
                  NODE_ENV=production
                  PORT=5000
                  CORS_ORIGIN=http://localhost:3000
                  EOF

            # Pull the images that the build job just pushed
            - name: Pull latest images
              run: docker compose pull

            - name: Start full stack
              run: docker compose up -d

            # Wait for the backend /api/health to return 200.
            # The backend HEALTHCHECK in its Dockerfile does the same check — 
            # this loop is a belt-and-suspenders wait for the CI environment.
            - name: Wait for backend to become healthy
              run: |
                  echo "Polling http://localhost:5000/api/health ..."
                  for i in $(seq 1 30); do
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || echo "000")
                    if [ "$STATUS" = "200" ]; then
                      echo "✓ Backend healthy after $((i * 3))s (HTTP 200)"
                      exit 0
                    fi
                    echo "  attempt $i/30 — got HTTP $STATUS, retrying in 3s..."
                    sleep 3
                  done
                  echo "✗ Backend did not become healthy within 90s"
                  docker compose logs backend --tail 80
                  exit 1

            # Run the health check script with --skip-env because env vars are already
            # injected by the step above, not stored in a local .env file on the runner.
            - name: Run Python health check script
              run: |
                  python3 backend/scripts/health_check.py \
                    --host     localhost \
                    --port     5000 \
                    --skip-env \
                    --timeout  15 \
                    --warn-ms  800

            # Always print logs on failure so you can debug without SSH access
            - name: Dump container logs on failure
              if: failure()
              run: |
                  echo "════════ backend logs ════════"
                  docker compose logs backend --tail 100
                  echo "════════ db logs ════════"
                  docker compose logs db --tail 40
                  echo "════════ frontend logs ════════"
                  docker compose logs frontend --tail 40

            # Always clean up — even if health check fails
            - name: Tear down stack
              if: always()
              run: docker compose down -v --remove-orphans
    # ═══════════════════════════════════════════════════════════════════════════════
    # JOB 5 — Deploy to production (disabled — uncomment when you have a server)
    #
    # Connects to the server over SSH and runs docker compose pull + up.
    # Only runs after the health-check job passes on the main branch.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE:  garvg4278/shipforge-backend
  FRONTEND_IMAGE: garvg4278/shipforge-frontend
  NODE_VERSION:   "20"
  PYTHON_VERSION: "3.11"

jobs:

  lint-backend:
    name: Lint · Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all JS files
        run: |
          find . \
            -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./prisma/migrations/*" \
            -print0 | xargs -0 node --check
          echo "All files passed syntax check."

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  lint-frontend:
    name: Lint · Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run check

  build:
    name: Build · Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build backend image (pull request)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:pr-${{ github.sha }}

      - name: Build and push frontend image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:5000/api
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Build frontend image (pull request)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:pr-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:5000/api

  health-check:
    name: Integration · Health Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Write CI environment file
        run: |
          JWT=$(python3 -c "import secrets; print(secrets.token_hex(64))")
          cat > .env <<EOF
          POSTGRES_USER=shipforge
          POSTGRES_PASSWORD=shipforge_ci
          POSTGRES_DB=shipforge
          DATABASE_URL=postgresql://shipforge:shipforge_ci@db:5432/shipforge
          JWT_SECRET=${JWT}
          NODE_ENV=production
          PORT=5000
          CORS_ORIGIN=http://localhost:3000
          EOF

      - name: Pull latest images
        run: docker compose pull

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for backend to become healthy
        run: |
          echo "Polling http://localhost:5000/api/health ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after $((i * 3))s (HTTP 200)"
              exit 0
            fi
            echo "  attempt $i/30 - got HTTP $STATUS, retrying in 3s..."
            sleep 3
          done
          echo "Backend did not become healthy within 90s"
          docker compose logs backend --tail 80
          exit 1

      - name: Run Python health check script
        run: |
          python3 backend/scripts/health_check.py \
            --host     localhost \
            --port     5000 \
            --skip-env \
            --timeout  15 \
            --warn-ms  800

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== backend logs ==="
          docker compose logs backend --tail 100
          echo "=== db logs ==="
          docker compose logs db --tail 40
          echo "=== frontend logs ==="
          docker compose logs frontend --tail 40

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

# docker-compose.yml
# Local development stack: API + PostgreSQL + Adminer (DB GUI)
# Usage: docker compose up -d

version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shipforge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shipforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipforge_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-shipforge}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shipforge}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: shipforge_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-shipforge}:${POSTGRES_PASSWORD:-shipforge_dev_password}@postgres:5432/${POSTGRES_DB:-shipforge}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    ports:
      - '5000:5000'
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Adminer (PostgreSQL web GUI) ────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: shipforge_adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  api_logs:

services:
  frontend:
    image: garvg4278/shipforge-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    image: garvg4278/shipforge-backend:latest
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: shipforge
      POSTGRES_PASSWORD: shipforge_dev
      POSTGRES_DB: shipforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: